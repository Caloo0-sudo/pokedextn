<div class="graph-container glass-effect" *ngIf="pokemon">
    <div class="pokemon-info">
        <div class="pokemon-header">
            <span class="pokemon-id">
                #{{pokemon.getId().toString().padStart(3, '0')}}
            </span>
            <h2 class="pokemon-name">{{pokemon.getNombre()}}</h2>
            <span class="pokemon-type">{{pokemon.getTipo()}}</span>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-item" *ngFor="let stat of stats">
            <div class="stat-label">
                <span>{{stat.name}}</span>
                <span class="stat-value">{{stat.value}}</span>
            </div>
            <div class="stat-bar">
                <div class="stat-fill" [style.width.%]="getStatPercentage(stat.value)"></div>
            </div>
        </div>
    </div>
</div>
