<div class="pokedex-view">
    <div class="led-section">
        <div class="led main"></div>
        <div class="led red"></div>
        <div class="led yellow"></div>
        <div class="led green"></div>
    </div>

    <div class="screen">
        <app-pokedex [imageUrl]="currentPokemon?.imagen || './assets/pokeball.png'"></app-pokedex>
    </div>

    <div class="info-section">
        <h2>{{currentPokemon?.nombre || '???'}}</h2>
        <p>No. {{currentPokemon?.id || '???'}}</p>
        <p>Tipo: {{currentPokemon?.tipo || '???'}}</p>
    </div>

    <app-graph></app-graph>

    <div class="nav-buttons">
        <button class="nav-btn" (click)="prevPokemon()">
            <i class="fas fa-chevron-left"></i> Anterior
        </button>
        <button class="nav-btn" (click)="nextPokemon()">
            Siguiente <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>
