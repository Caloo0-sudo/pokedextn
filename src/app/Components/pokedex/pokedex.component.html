<div class="pokemon-card" [class.loading]="isLoading">
    <div class="shine-effect" *ngIf="showShineEffect"></div>

    <div class="pokemon-display">
        <img [src]="imageUrl" [alt]="pokemon?.getNombre() || 'Pokemon'" class="pokemon-image" (load)="onImageLoad()"
            [class.hidden]="isLoading">

        <div class="loading-spinner" *ngIf="isLoading">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="pokemon-info" *ngIf="pokemon">
        <h2 class="pokemon-name">{{pokemon.getNombre()}}</h2>
        <div class="pokemon-types">
            <span class="type-badge" [class]="getTypeClass(pokemon.getTipo())">
                {{pokemon.getTipo()}}
            </span>
        </div>

        <div class="stats-display">
            <div class="stat-item">
                <span class="stat-label">HP</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="pokemon.getVida()">
                    </div>
                </div>
            </div>

            <div class="stat-item">
                <span class="stat-label">ATK</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="pokemon.getAtaque()">
                    </div>
                </div>
            </div>

            <div class="stat-item">
                <span class="stat-label">DEF</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="pokemon.getDefensa()">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
