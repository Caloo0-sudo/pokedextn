<div class="stats-container">
    <div class="stat-item">
        <div class="stat-label">
            <span>HP</span>
            <span>{{vidaPokemon}}</span>
        </div>
        <div class="stat-bar" [style.width.%]="vidaPokemon"></div>
    </div>

    <div class="stat-item">
        <div class="stat-label">
            <span>Ataque</span>
            <span>{{ataquePokemon}}</span>
        </div>
        <div class="stat-bar" [style.width.%]="ataquePokemon"></div>
    </div>

    <div class="stat-item">
        <div class="stat-label">

            <div class="stat-label">
                <span>Defensa</span>
                <span>{{defensaPokemon}}</span>
            </div>
            <div class="stat-bar" [style.width.%]="defensaPokemon"></div>
        </div>

        <div class="pokemon-info">
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="info-value">{{idPokemon}}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Tipo:</span>
                <span class="info-value" [class]="'type-' + tipoPokemon.toLowerCase()">
                    {{tipoPokemon}}
                </span>
            </div>
        </div>
    </div>
