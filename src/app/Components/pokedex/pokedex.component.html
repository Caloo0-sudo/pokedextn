<div class="pokemon-card" *ngIf="pokemon">
    <div class="shine-effect" *ngIf="!isLoading"></div>

    <div class="pokemon-display">
        <img [src]="pokemon.getImagen()" [alt]="pokemon.getNombre()" class="pokemon-image" (load)="onImageLoad()"
            [class.hidden]="isLoading">

        <div class="loading-spinner" *ngIf="isLoading">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="pokemon-info glass-effect" [class.hidden]="isLoading">
        <div class="pokemon-types">
            <span class="type-badge" [ngClass]="'type-' + pokemon.getTipo().toLowerCase()">
                {{pokemon.getTipo()}}
            </span>
        </div>

        <div class="stats-display">
            <div class="stat-item" *ngFor="let stat of ['HP', 'ATK', 'DEF']">
                <div class="stat-label">
                    <span>{{stat}}</span>
                    <span>{{getStat(stat)}}</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="getStatPercentage(stat)"></div>
                </div>
            </div>
        </div>
    </div>
</div>
