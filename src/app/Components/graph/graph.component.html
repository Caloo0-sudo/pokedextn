<div class="graph-container">
    <!-- Información del Pokémon -->
    <div class="pokemon-info">
        <div class="pokemon-header">
            <span class="pokemon-id">{{idPokemon}}</span>
            <h2 class="pokemon-name">{{nombrePokemon}}</h2>
            <span class="pokemon-type">{{tipoPokemon}}</span>
        </div>

        <!-- Estadísticas -->
        <div class="stats-container">
            <!-- Vida -->
            <div class="stat-item">
                <span class="stat-label">HP</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="vidaPokemon"></div>
                </div>
                <span class="stat-value">{{vidaPokemon}}</span>
            </div>

            <!-- Ataque -->
            <div class="stat-item">
                <span class="stat-label">ATK</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="ataquePokemon"></div>
                </div>
                <span class="stat-value">{{ataquePokemon}}</span>
            </div>

            <!-- Defensa -->
            <div class="stat-item">
                <span class="stat-label">DEF</span>
                <div class="stat-bar">
                    <div class="stat-fill" [style.width.%]="defensaPokemon"></div>
                </div>
                <span class="stat-value">{{defensaPokemon}}</span>
            </div>
        </div>
    </div>
</div>
